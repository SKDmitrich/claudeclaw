<!-- Custom date range picker modal -->
<div id="custom-date-modal" class="fixed inset-0 z-[100] hidden" onclick="if(event.target===this)closeDateModal()">
    <div class="absolute inset-0 bg-black/30"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-2xl shadow-xl p-5 w-80">
        <div class="flex items-center justify-between mb-4">
            <h3 class="font-semibold text-gray-900">Выбрать период</h3>
            <button onclick="closeDateModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <div class="space-y-3">
            <div>
                <label class="block text-sm text-gray-600 mb-1">С</label>
                <input type="date" id="date-from" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">По</label>
                <input type="date" id="date-to" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
        </div>
        <button onclick="applyCustomDate()" class="w-full mt-4 px-4 py-2.5 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800 transition">Применить</button>
    </div>
</div>

<script>
function openDateModal() {
    document.querySelectorAll('[id$="-dd"]').forEach(d => d.classList.add('hidden'));
    const modal = document.getElementById('custom-date-modal');
    // Pre-fill with current values if available
    const params = new URLSearchParams(window.location.search);
    if (params.get('date_from')) document.getElementById('date-from').value = params.get('date_from');
    if (params.get('date_to')) document.getElementById('date-to').value = params.get('date_to');
    modal.classList.remove('hidden');
}
function closeDateModal() {
    document.getElementById('custom-date-modal').classList.add('hidden');
}
</script>
